services:
  zonia:
    # Build context is the repo root so the Dockerfile can pull in client/
    # alongside server/. Run via `just docker-up` from the repo root, or
    # `docker compose -f server/compose.yaml up` (compose resolves relative
    # paths from the file's directory, so `..` walks to repo root).
    build:
      context: ..
      dockerfile: server/Dockerfile
    image: ghcr.io/jackharrhy/zonia:local
    volumes:
      - ./data:/data
    environment:
      - ZONIA_DATABASE=/data/zonia.db
      - PHX_HOST=zonia.harrhy.xyz
      - PORT=4000
      # Generate a real one with `mix phx.gen.secret` — this default is fine
      # for kicking the tyres locally, but DO NOT use it for anything public.
      - SECRET_KEY_BASE=local-development-secret-key-base-at-least-sixty-four-characters-long-aaaaaaaaaaaaaaaaaaaaa
    ports:
      - 127.0.0.1:4000:4000
    env_file:
      - .env
    restart: unless-stopped
